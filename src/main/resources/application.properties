spring.application.name=BookingApp

spring.config.import=file:application-secret.properties

spring.datasource.url = jdbc:mysql://localhost:3306/bookingapp
spring.datasource.username = root
spring.datasource.password = 1234

server.port=8081

spring.jpa.hibernate.ddl-auto = none
#spring.jpa.hibernate.ddl-auto = create
#spring.jpa.hibernate.ddl-auto = update
#spring.jpa.hibernate.ddl-auto = create-drop

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans = true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.profiles.active=uat

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
server.servlet.session.timeout=30m

# hi?n log cho WebSocket user mapping
#logging.level.org.springframework.web.socket.messaging=TRACE
#logging.level.org.springframework.messaging.simp.user=TRACE
#logging.level.org.springframework.messaging.simp=TRACE

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
